<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL发布时间提取工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        .upload-area.dragover {
            background: #e8eaff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .config-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
        }

        .config-row label {
            font-weight: 500;
            color: #555;
        }

        .config-row select {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .progress-section {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        .results-table th {
            background: #f8f9ff;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #667eea;
        }

        .results-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
        }

        .results-table tr:hover {
            background: #f8f9ff;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .log-area {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 5px;
        }

        .log-info { color: #4ec9b0; }
        .log-error { color: #f48771; }
        .log-success { color: #89d185; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 URL发布时间提取工具</h1>
            <p>批量从网页源码中提取发布时间 | 支持多种提取策略 | 自动标准化格式</p>
        </div>

        <div class="content">
            <!-- 步骤1: 上传文件 -->
            <div class="section">
                <div class="section-title">1. 上传CSV文件</div>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div>点击或拖拽CSV文件到此处</div>
                    <div style="font-size: 12px; color: #999; margin-top: 10px;">支持包含URL列的CSV文件</div>
                </div>
                <input type="file" id="fileInput" accept=".csv">
            </div>

            <!-- 步骤2: 配置 -->
            <div class="section" id="configSection" style="display: none;">
                <div class="section-title">2. 选择配置</div>
                <div class="config-row">
                    <label>URL所在列名：</label>
                    <select id="urlColumn"></select>
                </div>
                <div class="config-row">
                    <label>提取数量限制：</label>
                    <select id="limitSelect">
                        <option value="10">前10条（测试）</option>
                        <option value="50">前50条</option>
                        <option value="100">前100条</option>
                        <option value="0" selected>全部</option>
                    </select>
                </div>
                <button class="btn" id="startBtn">开始提取</button>
            </div>

            <!-- 步骤3: 进度 -->
            <div class="section progress-section" id="progressSection">
                <div class="section-title">3. 提取进度</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statProcessed">0</div>
                        <div class="stat-label">已处理</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statSuccess">0</div>
                        <div class="stat-label">成功</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statFailed">0</div>
                        <div class="stat-label">失败</div>
                    </div>
                </div>
                <div class="log-area" id="logArea"></div>
            </div>

            <!-- 步骤4: 结果 -->
            <div class="section" id="resultsSection" style="display: none;">
                <div class="section-title">4. 提取结果</div>
                <button class="btn" id="downloadBtn">下载结果CSV</button>
                <div style="overflow-x: auto; max-height: 500px; overflow-y: auto; margin-top: 20px;">
                    <table class="results-table" id="resultsTable">
                        <thead>
                            <tr>
                                <th>URL</th>
                                <th>提取的发布时间</th>
                                <th>提取方法</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let csvData = [];
        let headers = [];
        let results = [];

        // 上传区域交互
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        // 处理CSV文件
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                parseCSV(text);
            };
            reader.readAsText(file);
        }

        function parseCSV(text) {
            const lines = text.split('\n').filter(line => line.trim());
            headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            csvData = lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                const row = {};
                headers.forEach((h, i) => row[h] = values[i]);
                return row;
            });

            // 填充列名选择
            const urlColumn = document.getElementById('urlColumn');
            urlColumn.innerHTML = headers.map(h => `<option value="${h}">${h}</option>`).join('');
            
            // 显示配置区域
            document.getElementById('configSection').style.display = 'block';
            addLog('文件加载成功，共 ' + csvData.length + ' 行数据', 'success');
        }

        // 开始提取
        document.getElementById('startBtn').addEventListener('click', startExtraction);

        async function startExtraction() {
            const urlColumn = document.getElementById('urlColumn').value;
            const limit = parseInt(document.getElementById('limitSelect').value);
            
            const urlsToProcess = limit > 0 ? csvData.slice(0, limit) : csvData;
            
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('startBtn').disabled = true;
            
            results = [];
            updateStats(urlsToProcess.length, 0, 0, 0);
            
            addLog('开始提取，共 ' + urlsToProcess.length + ' 条URL', 'info');

            for (let i = 0; i < urlsToProcess.length; i++) {
                const row = urlsToProcess[i];
                const url = row[urlColumn];
                
                addLog(`[${i+1}/${urlsToProcess.length}] 提取: ${url}`, 'info');
                
                const result = await extractPublishTime(url);
                results.push(result);
                
                const success = results.filter(r => r.status === 'success').length;
                const failed = results.filter(r => r.status !== 'success').length;
                updateStats(urlsToProcess.length, i + 1, success, failed);
                
                if (result.status === 'success') {
                    addLog(`✓ 成功: ${result.extracted_publish_time} (${result.extraction_method})`, 'success');
                } else {
                    addLog(`✗ 失败: ${result.status}`, 'error');
                }
                
                // 礼貌延迟
                await sleep(500);
            }

            addLog('全部完成！', 'success');
            document.getElementById('startBtn').disabled = false;
            showResults();
        }

        // 提取发布时间的核心函数（使用CORS代理）
        async function extractPublishTime(url) {
            try {
                // 使用CORS代理
                const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
                const response = await fetch(proxyUrl, { timeout: 10000 });
                const data = await response.json();
                const html = data.contents;

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // 方法1: meta标签
                const metaProps = ['article:published_time', 'og:published_time', 'publishdate', 'date', 'pubdate'];
                for (const prop of metaProps) {
                    const meta = doc.querySelector(`meta[property="${prop}"], meta[name="${prop}"]`);
                    if (meta && meta.content) {
                        return {
                            url,
                            extracted_publish_time: normalizeDate(meta.content),
                            extraction_method: 'meta',
                            status: 'success'
                        };
                    }
                }

                // 方法2: JSON-LD
                const scripts = doc.querySelectorAll('script[type="application/ld+json"]');
                for (const script of scripts) {
                    try {
                        const jsonData = JSON.parse(script.textContent);
                        const items = Array.isArray(jsonData) ? jsonData : [jsonData];
                        for (const item of items) {
                            for (const field of ['datePublished', 'publishDate', 'dateCreated', 'uploadDate']) {
                                if (item[field]) {
                                    return {
                                        url,
                                        extracted_publish_time: normalizeDate(item[field]),
                                        extraction_method: 'json-ld',
                                        status: 'success'
                                    };
                                }
                            }
                        }
                    } catch {}
                }

                // 方法3: time标签
                const timeTags = doc.querySelectorAll('time');
                for (const tag of timeTags) {
                    if (tag.dateTime) {
                        return {
                            url,
                            extracted_publish_time: normalizeDate(tag.dateTime),
                            extraction_method: 'time-tag',
                            status: 'success'
                        };
                    }
                }

                return {
                    url,
                    extracted_publish_time: null,
                    extraction_method: null,
                    status: 'no_time_found'
                };

            } catch (error) {
                return {
                    url,
                    extracted_publish_time: null,
                    extraction_method: null,
                    status: 'error: ' + error.message
                };
            }
        }

        function normalizeDate(dateStr) {
            try {
                const date = new Date(dateStr);
                if (!isNaN(date.getTime())) {
                    return date.toISOString().replace('T', ' ').substring(0, 19);
                }
            } catch {}
            return dateStr;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function updateStats(total, processed, success, failed) {
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statProcessed').textContent = processed;
            document.getElementById('statSuccess').textContent = success;
            document.getElementById('statFailed').textContent = failed;
            
            const percentage = Math.round((processed / total) * 100);
            const fill = document.getElementById('progressFill');
            fill.style.width = percentage + '%';
            fill.textContent = percentage + '%';
        }

        function addLog(message, type = 'info') {
            const logArea = document.getElementById('logArea');
            const entry = document.createElement('div');
            entry.className = 'log-entry log-' + type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function showResults() {
            document.getElementById('resultsSection').style.display = 'block';
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = results.map(r => `
                <tr>
                    <td style="max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${r.url}">${r.url}</td>
                    <td>${r.extracted_publish_time || '-'}</td>
                    <td>${r.extraction_method || '-'}</td>
                    <td><span class="status-badge ${r.status === 'success' ? 'status-success' : 'status-error'}">${r.status}</span></td>
                </tr>
            `).join('');
        }

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const csv = [
                ['url', 'extracted_publish_time', 'extraction_method', 'status'],
                ...results.map(r => [r.url, r.extracted_publish_time || '', r.extraction_method || '', r.status])
            ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');

            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'extracted_publish_times_' + Date.now() + '.csv';
            link.click();
        });
    </script>
</body>
</html>
